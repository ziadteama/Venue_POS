name: Build till bundle (Linux)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/pos/**'
      - 'apps/local-agent/**'
      - 'apps/watchdog/**'
      - 'ops/linux/**'
      - 'packages/**'
      - 'scripts/build-till-bundle.mjs'
      - 'setup.sh'

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (native modules for Linux)
        run: npm ci --include-workspace-root

      - name: Build till USB bundle (AppImage + tar.gz)
        env:
          BUILD_POS_APPIMAGE: '1'
        run: npm run build:till-bundle

      - name: Verify AppImage in bundle
        run: |
          ls -la dist/
          ls -la dist/venue-pos-till-*/pos/release/*.AppImage
          test -f dist/venue-pos-till-*.tar.gz

      - name: Upload till bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: venue-pos-till-linux
          path: |
            dist/venue-pos-till-*.tar.gz
          retention-days: 14
