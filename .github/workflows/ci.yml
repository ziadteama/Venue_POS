name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      local-agent: ${{ steps.filter.outputs.local-agent }}
      watchdog: ${{ steps.filter.outputs.watchdog }}
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: git
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'
            local-agent:
              - 'apps/local-agent/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'
            watchdog:
              - 'apps/watchdog/**'
              - 'package.json'
              - 'package-lock.json'
            build:
              - 'apps/dashboard/**'
              - 'apps/pos/**'
              - 'apps/kds/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:i18n

  api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        # Docker Hub often times out on GHA; ECR public mirror is the same official image.
        image: public.ecr.aws/docker/library/postgres:16-alpine
        env:
          POSTGRES_USER: hub_pos
          POSTGRES_PASSWORD: hub_pos_test
          POSTGRES_DB: hub_pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hub_pos -d hub_pos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://hub_pos:hub_pos_test@localhost:5432/hub_pos_test
      JWT_PRIVATE_KEY_PATH: ../../ops/secrets/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: ../../ops/secrets/jwt-public.pem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run generate:jwt-keys
      - run: npm run migrate -w @venue-pos/api
      - run: npm run seed -w @venue-pos/api
      - run: npm run test -w @venue-pos/api --if-present

  local-agent:
    needs: changes
    if: needs.changes.outputs.local-agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run test -w @venue-pos/local-agent

  watchdog:
    needs: changes
    if: needs.changes.outputs.watchdog == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run test -w @venue-pos/watchdog

  build:
    runs-on: ubuntu-latest
    needs: [lint, changes, api, local-agent, watchdog]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.changes.outputs.build == 'true' &&
      (needs.api.result == 'success' || needs.api.result == 'skipped') &&
      (needs.local-agent.result == 'success' || needs.local-agent.result == 'skipped') &&
      (needs.watchdog.result == 'success' || needs.watchdog.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build:dashboard
      - run: npm run build:pos
      - run: npm run build:kds
