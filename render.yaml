services:
  - type: web
    name: venue-pos-api
    runtime: node
    region: frankfurt  # closest Render region to Egypt
    plan: standard    # $25/mo — stays up 24/7, no spin-down (use "free" only for testing)

    # Build from repo root so the monorepo workspace resolves correctly
    rootDir: .
    buildCommand: npm ci --workspace=@venue-pos/api --include-workspace-root && npm run db:generate -w @venue-pos/api
    startCommand: cd apps/api && npx prisma migrate deploy && node src/index.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: venue-pos-db
          property: connectionString
      # JWT keys — paste PEM content (with literal \n) in Render dashboard
      - key: JWT_PRIVATE_KEY
        sync: false   # set manually in Render dashboard
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "30d"
      - key: JWT_ISSUER
        value: "hub-pos-system"
      - key: JWT_AUDIENCE
        value: "hub-pos-clients"
      - key: BCRYPT_ROUNDS
        value: "12"
      # Set to your dashboard + POS domains after deploy
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-dashboard.onrender.com"
      - key: LOG_LEVEL
        value: "info"
      # Feature flags — adjust per venue
      - key: FEATURE_KDS_ENABLED
        value: "false"
      - key: FEATURE_MANUAL_CARD_PAYMENT
        value: "false"
      - key: FEATURE_LINE_TRANSFER
        value: "false"
      - key: FEATURE_DISCOUNTS_ENABLED
        value: "true"
      - key: FEATURE_REFUNDS_ENABLED
        value: "true"
      - key: FEATURE_AUTO_RECEIPT_PRINT
        value: "true"
      - key: FEATURE_CROSS_VENUE_BILLING
        value: "false"
      - key: OPS_INGEST_SECRET
        sync: false   # set a strong random secret in Render dashboard

databases:
  - name: venue-pos-db
    databaseName: hub_pos
    user: hub_pos
    region: frankfurt  # closest Render region to Egypt — matches service region
    plan: basic-1gb    # new flexible plan — cheapest paid tier, no expiry, PITR included
    storage: 10        # GB — minimum on flexible plans; increase later without downtime
